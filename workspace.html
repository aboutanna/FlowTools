<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTools</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/workspace.css">
</head>
<body>

<div class="workspace">

    <header class="workspace-header">
        <h1 class="workspace-wordmark">FlowTools</h1>
        <p class="workspace-greeting" id="greeting">Good afternoon.</p>
        <p class="workspace-tagline">Take your time.</p>
    </header>

    <main id="toolList"></main>

    <footer class="workspace-footer">
        <button class="footer-btn" id="settingsBtn">Settings</button>
        <button class="footer-btn" id="logoutBtn">Logout</button>
    </footer>

</div>

<!-- Toast -->
<div class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script type="module" src="js/workspace.js"></script>

</body>
</html>
